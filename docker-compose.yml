services:
  # MySQL Database with persistent volume
  # WARNING: Use 'docker-compose down' (NOT 'docker-compose down -v')
  # to preserve data across redeployments.
  # For cloud deployments, use a managed database service instead.
  db:
    image: mysql:8.4
    container_name: timetable_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: timetable_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: timetable_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: timetable_server
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: timetable_db
      # Set to 'true' to use file-based JSON persistence (writes to ./server/data)
      # When using MySQL, leave this as 'false' or unset.
      USE_FILE_DB: ${USE_FILE_DB:-false}
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:5000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Persist server-side JSON data when using file DB adapter
      - ./server/data:/app/data

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: timetable_client
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      REACT_APP_API_URL: http://localhost:5000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 25s
    depends_on:
      server:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MYSQL_DATA_PATH:-.}/mysql_data
